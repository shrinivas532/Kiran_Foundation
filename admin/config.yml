backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "content"
    label: "Site Content"
    editor:
      preview: false
    files:

      - name: "gallery"
        label: "Gallery Photos"
        file: "content/gallery.json"
        format: "json"
        fields:
          - name: "items"
            label: "Photos"
            label_singular: "Photo"
            widget: "list"
            summary: "{{fields.caption_en}} ({{fields.category}})"
            fields:
              - { name: "image", label: "Photo", widget: "image", required: true }
              - { name: "caption_en", label: "Caption (English)", widget: "string" }
              - { name: "caption_kn", label: "Caption (ಕನ್ನಡ)", widget: "string" }
              - name: "category"
                label: "Category"
                widget: "select"
                options:
                  - { label: "Village Visits / ಗ್ರಾಮ ಭೇಟಿ", value: "village-visits" }
                  - { label: "Skill Camps / ಕೌಶಲ್ಯ ಶಿಬಿರ", value: "skill-camps" }
                  - { label: "Sports & Events / ಕ್ರೀಡೆ ಮತ್ತು ಕಾರ್ಯಕ್ರಮ", value: "sports-events" }
                  - { label: "Job Fairs / ಉದ್ಯೋಗ ಮೇಳ", value: "job-fairs" }
                  - { label: "Community / ಸಮುದಾಯ", value: "community" }
                  - { label: "Field Visits / ಕ್ಷೇತ್ರ ಭೇಟಿ", value: "field-visits" }
                default: "community"
                hint: "Pick a category for filtering on the website"
              - { name: "date", label: "Date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }

      - name: "videos"
        label: "YouTube Videos"
        file: "content/videos.json"
        format: "json"
        fields:
          - name: "items"
            label: "Videos"
            label_singular: "Video"
            widget: "list"
            summary: "{{fields.title_en}}"
            fields:
              - { name: "youtube_id", label: "YouTube Video ID", widget: "string", hint: "The part after v= in the YouTube URL. Example: if URL is youtube.com/watch?v=dQw4w9WgXcQ then enter dQw4w9WgXcQ" }
              - { name: "title_en", label: "Title (English)", widget: "string" }
              - { name: "title_kn", label: "Title (ಕನ್ನಡ)", widget: "string" }
              - { name: "description_en", label: "Description (English)", widget: "text" }
              - { name: "description_kn", label: "Description (ಕನ್ನಡ)", widget: "text" }

      - name: "podcasts"
        label: "Podcast Episodes"
        file: "content/podcasts.json"
        format: "json"
        fields:
          - name: "items"
            label: "Episodes"
            label_singular: "Episode"
            widget: "list"
            summary: "{{fields.title_en}} — {{fields.date}}"
            fields:
              - { name: "title_en", label: "Title (English)", widget: "string" }
              - { name: "title_kn", label: "Title (ಕನ್ನಡ)", widget: "string" }
              - { name: "description_en", label: "Description (English)", widget: "text" }
              - { name: "description_kn", label: "Description (ಕನ್ನಡ)", widget: "text" }
              - { name: "listen_url", label: "Listen URL", widget: "string", hint: "Link to episode on Spotify, YouTube, Google Podcasts, etc." }
              - { name: "date", label: "Date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }

      - name: "impact"
        label: "Our Impact"
        file: "content/impact.json"
        format: "json"
        fields:
          - name: "stats"
            label: "Impact Numbers"
            label_singular: "Stat"
            widget: "list"
            summary: "{{fields.label_en}}: {{fields.value}}{{fields.suffix}}"
            hint: "Big numbers shown at the top (e.g. 500+ Youth Trained)"
            fields:
              - { name: "value", label: "Number", widget: "number", value_type: "int", hint: "e.g. 500" }
              - { name: "suffix", label: "Suffix", widget: "string", required: false, hint: "e.g. + or %" }
              - { name: "label_en", label: "Label (English)", widget: "string", hint: "e.g. Youth Trained" }
              - { name: "label_kn", label: "Label (ಕನ್ನಡ)", widget: "string", hint: "e.g. ತರಬೇತಿ ಪಡೆದ ಯುವಕರು" }
          - name: "bars"
            label: "Progress Bars"
            label_singular: "Bar"
            widget: "list"
            summary: "{{fields.label_en}}: {{fields.percent}}%"
            hint: "Percentage bars shown below the numbers"
            fields:
              - { name: "label_en", label: "Label (English)", widget: "string", hint: "e.g. Employment After Training" }
              - { name: "label_kn", label: "Label (ಕನ್ನಡ)", widget: "string" }
              - { name: "percent", label: "Percentage", widget: "number", value_type: "int", min: 0, max: 100 }

      - name: "stories"
        label: "Social Impact Stories"
        file: "content/stories.json"
        format: "json"
        fields:
          - name: "stories"
            label: "Stories"
            label_singular: "Story"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { name: "photo", label: "Person's Photo", widget: "image", required: false, hint: "Clear portrait photo. Will show large on the website." }
              - { name: "name", label: "Person's Name", widget: "string" }
              - { name: "location", label: "Village / Location", widget: "string", required: false, hint: "e.g. Kudachi, Nippani — shown below name" }
              - { name: "outcome_en", label: "Outcome (English)", widget: "string", hint: "One line — e.g. Got a job in electrical maintenance" }
              - { name: "outcome_kn", label: "Outcome (Kannada)", widget: "string" }
              - { name: "quote_en", label: "Their Quote (English)", widget: "text", hint: "What they said about KIRAN Foundation. Use their real words with their permission." }
              - { name: "quote_kn", label: "Their Quote (Kannada)", widget: "text" }

      - name: "team"
        label: "Founding Team"
        file: "content/team.json"
        format: "json"
        fields:
          - name: "members"
            label: "Members"
            label_singular: "Member"
            widget: "list"
            summary: "{{fields.name}} — {{fields.role_en}}"
            fields:
              - { name: "photo", label: "Photo", widget: "image", required: false, hint: "Upload a clear portrait photo. Square or portrait orientation works best." }
              - { name: "name", label: "Name", widget: "string", hint: "Full name as it should appear on the website" }
              - { name: "role_en", label: "Role (English)", widget: "string", hint: "e.g. Founder & President, Programme Director" }
              - { name: "role_kn", label: "Role (Kannada)", widget: "string", hint: "e.g. ಸಂಸ್ಥಾಪಕ ಮತ್ತು ಅಧ್ಯಕ್ಷ" }
              - { name: "bio_en", label: "Short Bio (English)", widget: "text", required: false, hint: "1-2 sentences. Optional." }
              - { name: "bio_kn", label: "Short Bio (Kannada)", widget: "text", required: false }

      - name: "about"
        label: "About & Founding Story"
        file: "content/about.json"
        format: "json"
        fields:
          - { name: "founding_story_en", label: "Founding Story (English)", widget: "markdown", required: false, hint: "Tell the story of how and why KIRAN Foundation started. 2-4 paragraphs." }
          - { name: "founding_story_kn", label: "Founding Story (Kannada)", widget: "markdown", required: false, hint: "ಕನ್ನಡದಲ್ಲಿ ಪ್ರತಿಷ್ಠಾನದ ಹಿನ್ನೆಲೆ ಬರೆಯಿರಿ." }
          - { name: "mission_en", label: "Mission Statement (English)", widget: "string" }
          - { name: "mission_kn", label: "Mission Statement (Kannada)", widget: "string" }
          - { name: "core_values_en", label: "Core Values (English)", widget: "markdown", required: false, hint: "KIRAN = Knowledge, Innovation, Reform, Aspiration, Nurture. Explain each briefly." }
          - { name: "core_values_kn", label: "Core Values (Kannada)", widget: "markdown", required: false }

      - name: "press"
        label: "Press Releases"
        file: "content/press.json"
        format: "json"
        fields:
          - name: "items"
            label: "Press Items"
            label_singular: "Press Item"
            widget: "list"
            summary: "{{fields.headline_en}} — {{fields.outlet_name}}"
            fields:
              - { name: "outlet_name", label: "News Outlet Name", widget: "string" }
              - { name: "headline_en", label: "Headline (English)", widget: "string" }
              - { name: "headline_kn", label: "Headline (ಕನ್ನಡ)", widget: "string" }
              - { name: "date", label: "Date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
              - { name: "article_url", label: "Article URL", widget: "string", required: false, hint: "Link to the online article" }
              - { name: "pdf", label: "Press Note PDF", widget: "file", required: false, hint: "Upload the press release PDF" }

      - name: "backgrounds"
        label: "Section Backgrounds"
        file: "content/backgrounds.json"
        format: "json"
        fields:
          - name: "items"
            label: "Section Backgrounds"
            label_singular: "Background"
            widget: "list"
            summary: "{{fields.section_key}}"
            hint: "Upload a background photo for each section. Leave photo empty to use the default image."
            fields:
              - name: "section_key"
                label: "Section"
                widget: "select"
                options: ["about", "programs", "gallery", "podcast", "videos", "impact", "stories", "press", "register", "contact", "footer"]
                hint: "Which section this background is for"
              - name: "photo"
                label: "Background Photo"
                widget: "image"
                required: false
                hint: "Upload a wide landscape photo. Leave empty to use default."

      - name: "settings"
        label: "Site Settings"
        file: "content/settings.json"
        format: "json"
        fields:
          - { name: "logo", label: "Site Logo", widget: "image", required: false, hint: "Upload your organization logo (PNG or SVG recommended)" }
          - { name: "site_title_en", label: "Site Title (English)", widget: "string" }
          - { name: "site_title_kn", label: "Site Title (ಕನ್ನಡ)", widget: "string" }
          - { name: "hero_badge_en", label: "Hero Badge Text (English)", widget: "string", required: false, default: "Kudachi, Belagavi District — Building Tomorrow" }
          - { name: "hero_badge_kn", label: "Hero Badge Text (Kannada)", widget: "string", required: false }
          - { name: "hero_headline_en", label: "Hero Headline (English)", widget: "string", required: false, default: "Building a self-reliant generation" }
          - { name: "hero_headline_kn", label: "Hero Headline (Kannada)", widget: "string", required: false }
          - { name: "hero_subtitle_en", label: "Hero Subtitle (English)", widget: "text", required: false }
          - { name: "hero_subtitle_kn", label: "Hero Subtitle (Kannada)", widget: "text", required: false }
          - { name: "vision_subtitle_en", label: "Vision Subtitle (English)", widget: "string", required: false }
          - { name: "vision_subtitle_kn", label: "Vision Subtitle (Kannada)", widget: "string", required: false }
          - { name: "contact_phone", label: "Contact Phone", widget: "string" }
          - { name: "contact_email", label: "Contact Email", widget: "string" }
          - { name: "whatsapp_number", label: "WhatsApp Number", widget: "string", hint: "Digits only with country code, e.g. 919876543210" }
          - { name: "facebook_url", label: "Facebook URL", widget: "string", required: false }
          - { name: "instagram_url", label: "Instagram URL", widget: "string", required: false }
          - { name: "twitter_url", label: "X / Twitter URL", widget: "string", required: false }
          - { name: "youtube_url", label: "YouTube URL", widget: "string", required: false }
